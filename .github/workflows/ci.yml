name: CI

on:
  push:
    branches: [main, "milestones/**", "feat/**", "fix/**", "chore/**", "docs/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }} / ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, "1.85.0"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.toolchain }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      # sdivi-wasm is a cdylib that only compiles for wasm32-unknown-unknown
      # (it uses wasm-bindgen types that don't implement the host-target ABI).
      # It has its own dedicated workflow at .github/workflows/wasm.yml.
      - name: cargo clippy
        run: cargo clippy --workspace --exclude sdivi-wasm -- -D warnings

      - name: cargo build
        run: cargo build --workspace --exclude sdivi-wasm

      - name: cargo test
        run: cargo test --workspace --exclude sdivi-wasm

  doc:
    name: Docs (ubuntu / stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc
        run: cargo doc --workspace --exclude sdivi-wasm --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
