name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"

env:
  CARGO_TERM_COLOR: always
  WASM_PACK_VERSION: "0.13.1"

# Publish order (milestone 13):
#   sdi-config → sdi-parsing → sdi-lang-* → sdi-graph → sdi-detection
#   → sdi-patterns → sdi-snapshot → sdi-core → sdi-pipeline → sdi-cli → sdi-rust
# npm: @geoffgodwin/sdi-wasm (depends only on sdi-core; published separately)

jobs:
  # ── Verify tag matches workspace version ──────────────────────────────────
  check-version:
    name: Verify version tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches Cargo.toml
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Strip pre-release suffix (e.g. 0.1.0-rc.1 → 0.1.0) for comparison
          TAG_BASE="${TAG%%-rc*}"
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_BASE" != "$CARGO_VER" ]; then
            echo "FAIL: tag base $TAG_BASE != Cargo.toml $CARGO_VER"
            exit 1
          fi
          echo "OK: tag $TAG base ($TAG_BASE) matches Cargo.toml $CARGO_VER"

  # ── Security audit ────────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Matrix binary build ───────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: [check-version]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
            bin: sdi
            artifact: sdi-x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
            bin: sdi
            artifact: sdi-aarch64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
            cross: false
            bin: sdi
            artifact: sdi-x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            cross: false
            bin: sdi
            artifact: sdi-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
            bin: sdi.exe
            artifact: sdi-x86_64-pc-windows-msvc.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross (Linux aarch64 only)
        if: matrix.cross
        run: cargo install cross

      - name: Build with cross
        if: matrix.cross
        run: cross build --release -p sdi-cli --target ${{ matrix.target }}

      - name: Build native
        if: "!matrix.cross"
        run: cargo build --release -p sdi-cli --target ${{ matrix.target }}

      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/${{ matrix.bin }} ${{ matrix.artifact }}

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" "${{ matrix.artifact }}"

      - name: Report binary size
        if: runner.os != 'Windows'
        run: |
          SIZE=$(wc -c < "${{ matrix.artifact }}")
          echo "Binary size (${{ matrix.target }}): ${SIZE} bytes ($(( SIZE / 1024 )) KiB)"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  # ── Create GitHub Release ─────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [build, audit]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: dist/

      - name: List dist/
        run: ls -lh dist/

      - name: Create release and attach binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish to crates.io (manual approval gate) ───────────────────────────
  publish-crates:
    name: Publish to crates.io
    needs: [create-release]
    runs-on: ubuntu-latest
    environment: crates-io-publish
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish sdi-config
        run: cargo publish -p sdi-config
      - run: sleep 30

      - name: Publish sdi-parsing
        run: cargo publish -p sdi-parsing
      - run: sleep 30

      - name: Publish language adapters
        run: |
          cargo publish -p sdi-lang-rust
          sleep 10
          cargo publish -p sdi-lang-python
          sleep 10
          cargo publish -p sdi-lang-typescript
          sleep 10
          cargo publish -p sdi-lang-javascript
          sleep 10
          cargo publish -p sdi-lang-go
          sleep 10
          cargo publish -p sdi-lang-java
      - run: sleep 30

      - name: Publish sdi-graph
        run: cargo publish -p sdi-graph
      - run: sleep 30

      - name: Publish sdi-detection
        run: cargo publish -p sdi-detection
      - run: sleep 30

      - name: Publish sdi-patterns
        run: cargo publish -p sdi-patterns
      - run: sleep 30

      - name: Publish sdi-snapshot
        run: cargo publish -p sdi-snapshot
      - run: sleep 30

      - name: Publish sdi-core
        run: cargo publish -p sdi-core
      - run: sleep 30

      - name: Publish sdi-pipeline
        run: cargo publish -p sdi-pipeline
      - run: sleep 30

      - name: Publish sdi-cli
        run: cargo publish -p sdi-cli
      - run: sleep 30

      - name: Publish sdi-rust (install-discovery meta-crate)
        run: cargo publish -p sdi-rust

  # ── Publish to npm (manual approval gate) ────────────────────────────────
  publish-npm:
    name: Publish @geoffgodwin/sdi-wasm to npm
    needs: [create-release]
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (WASM toolchain)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack ${{ env.WASM_PACK_VERSION }}
        run: cargo install wasm-pack --version ${{ env.WASM_PACK_VERSION }} --locked

      - uses: Swatinem/rust-cache@v2

      - name: Build WASM bundle (release-wasm profile)
        working-directory: bindings/sdi-wasm
        run: wasm-pack build --target bundler --profile release-wasm

      - name: Report WASM bundle size
        working-directory: bindings/sdi-wasm/pkg
        run: |
          SIZE=$(wc -c < sdi_wasm_bg.wasm)
          echo "WASM bundle size: ${SIZE} bytes ($(( SIZE / 1024 )) KiB)"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Dry-run (pre-release tags only)
        if: contains(github.ref_name, '-rc')
        working-directory: bindings/sdi-wasm/pkg
        run: npm publish --dry-run --access public

      - name: Publish to npm (release tags only)
        if: "!contains(github.ref_name, '-rc')"
        working-directory: bindings/sdi-wasm/pkg
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
