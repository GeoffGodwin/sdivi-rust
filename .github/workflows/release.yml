name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

# Publish order (enforced in Milestone 11):
#   sdi-config → sdi-parsing/sdi-graph/sdi-detection/sdi-patterns/sdi-snapshot
#   → sdi-core → sdi-cli → sdi-rust
#   Lang adapters (sdi-lang-*) published alongside sdi-parsing.

jobs:
  build:
    name: Build release binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p sdi-cli --target ${{ matrix.target }}

      # Publish to crates.io is wired up in Milestone 11.
