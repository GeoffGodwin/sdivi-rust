name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"

env:
  CARGO_TERM_COLOR: always
  WASM_PACK_VERSION: "0.13.1"

# Publish order (milestone 13):
#   sdivi-config → sdivi-parsing → sdivi-lang-* → sdivi-graph → sdivi-detection
#   → sdivi-patterns → sdivi-snapshot → sdivi-core → sdivi-pipeline → sdivi-cli → sdivi-rust
# npm: @geoffgodwin/sdivi-wasm (depends only on sdivi-core; published separately)

jobs:
  # ── Verify tag matches workspace version ──────────────────────────────────
  check-version:
    name: Verify version tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches Cargo.toml
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Strip pre-release suffix (e.g. 0.1.0-rc.1 → 0.1.0) for comparison
          TAG_BASE="${TAG%%-rc*}"
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_BASE" != "$CARGO_VER" ]; then
            echo "FAIL: tag base $TAG_BASE != Cargo.toml $CARGO_VER"
            exit 1
          fi
          echo "OK: tag $TAG base ($TAG_BASE) matches Cargo.toml $CARGO_VER"

  # ── Security audit ────────────────────────────────────────────────────────
  # NOTE: rust-toolchain.toml pins 1.85.0 for the workspace, but cargo-audit's
  # transitive deps now require >=1.86–1.89. We install cargo-audit using the
  # `stable` toolchain explicitly (with --locked, so cargo-audit's bundled
  # lockfile is used and we don't pick up a fresher transitive that bumps MSRV
  # again). `cargo audit` itself is a pre-built binary — once installed, it
  # doesn't need a Rust compiler to run, so it works fine against the workspace.
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit (stable toolchain, locked)
        run: cargo +stable install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit

  # ── Matrix binary build ───────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: [check-version]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
            bin: sdivi
            artifact: sdivi-x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
            bin: sdivi
            artifact: sdivi-aarch64-unknown-linux-gnu
          # macos-13 (Intel) was retired by GitHub Actions. We build the
          # x86_64-apple-darwin binary by cross-compiling from the Apple
          # Silicon runner — the Rust toolchain installs the x86_64 target
          # and the Apple SDK supports both arches natively. No `cross` needed.
          - os: macos-latest
            target: x86_64-apple-darwin
            cross: false
            bin: sdivi
            artifact: sdivi-x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            cross: false
            bin: sdivi
            artifact: sdivi-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
            bin: sdivi.exe
            artifact: sdivi-x86_64-pc-windows-msvc.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      # rust-toolchain.toml pins the workspace to 1.85.0, which overrides the
      # `stable` toolchain installed above for `cargo build` invocations. The
      # action's `targets:` input added the cross target to `stable`, not to
      # 1.85.0, so a cross-compile (e.g. arm64-host -> x86_64-apple-darwin)
      # fails with "can't find crate for `core`". Add the target to the
      # toolchain that cargo will actually use. This is a no-op for native
      # builds where target == host, since rustup installs the host target
      # by default. Skip for cross-rs jobs which manage their own targets.
      - name: Install cross target on workspace toolchain
        if: "!matrix.cross"
        run: rustup target add ${{ matrix.target }}

      - name: Install cross (Linux aarch64 only)
        if: matrix.cross
        # See audit job: rust-toolchain.toml's 1.85.0 pin is too old for
        # cross's transitive deps. --locked + +stable avoids the MSRV bump.
        run: cargo +stable install cross --locked

      - name: Build with cross
        if: matrix.cross
        run: cross build --release -p sdivi-cli --target ${{ matrix.target }}

      - name: Build native
        if: "!matrix.cross"
        run: cargo build --release -p sdivi-cli --target ${{ matrix.target }}

      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/${{ matrix.bin }} ${{ matrix.artifact }}

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" "${{ matrix.artifact }}"

      - name: Report binary size
        if: runner.os != 'Windows'
        run: |
          SIZE=$(wc -c < "${{ matrix.artifact }}")
          echo "Binary size (${{ matrix.target }}): ${SIZE} bytes ($(( SIZE / 1024 )) KiB)"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  # ── Create GitHub Release ─────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [build, audit]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: dist/

      - name: List dist/
        run: ls -lh dist/

      - name: Create release and attach binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish to crates.io (manual approval gate) ───────────────────────────
  publish-crates:
    name: Publish to crates.io
    needs: [create-release]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: crates-io-publish
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # All `cargo publish` calls go through scripts/publish-or-skip.sh,
      # which treats "crate version is already uploaded" as success. This
      # makes the job idempotent: if a publish fails partway through (e.g.
      # crates.io's new-crate rate limit, transient 5xx), the partial set
      # is recorded as published, and rerunning the job picks up where the
      # last attempt left off instead of failing immediately on the first
      # already-published crate.

      - name: Publish sdivi-config
        run: ./scripts/publish-or-skip.sh sdivi-config
      - run: sleep 30

      - name: Publish sdivi-parsing
        run: ./scripts/publish-or-skip.sh sdivi-parsing
      - run: sleep 30

      - name: Publish language adapters
        run: |
          ./scripts/publish-or-skip.sh sdivi-lang-rust
          sleep 10
          ./scripts/publish-or-skip.sh sdivi-lang-python
          sleep 10
          ./scripts/publish-or-skip.sh sdivi-lang-typescript
          sleep 10
          ./scripts/publish-or-skip.sh sdivi-lang-javascript
          sleep 10
          ./scripts/publish-or-skip.sh sdivi-lang-go
          sleep 10
          ./scripts/publish-or-skip.sh sdivi-lang-java
      - run: sleep 30

      - name: Publish sdivi-graph
        run: ./scripts/publish-or-skip.sh sdivi-graph
      - run: sleep 30

      - name: Publish sdivi-detection
        run: ./scripts/publish-or-skip.sh sdivi-detection
      - run: sleep 30

      - name: Publish sdivi-patterns
        run: ./scripts/publish-or-skip.sh sdivi-patterns
      - run: sleep 30

      - name: Publish sdivi-snapshot
        run: ./scripts/publish-or-skip.sh sdivi-snapshot
      - run: sleep 30

      - name: Publish sdivi-core
        run: ./scripts/publish-or-skip.sh sdivi-core
      - run: sleep 30

      - name: Publish sdivi-pipeline
        run: ./scripts/publish-or-skip.sh sdivi-pipeline
      - run: sleep 30

      - name: Publish sdivi-cli
        run: ./scripts/publish-or-skip.sh sdivi-cli
      - run: sleep 30

      - name: Publish sdivi-rust (install-discovery meta-crate)
        run: ./scripts/publish-or-skip.sh sdivi-rust

  # ── Publish to npm (manual approval gate) ────────────────────────────────
  # Uses npm Trusted Publishing (OIDC). Configured at
  # https://www.npmjs.com/package/@geoffgodwin/sdivi-wasm/access — that page
  # trusts: repo GeoffGodwin/sdivi-rust, workflow release.yml, environment
  # npm-publish. With trusted publishing, no NPM_PUBLISH_TOKEN secret is
  # needed; the npm CLI exchanges the GitHub OIDC token for short-lived
  # registry credentials and auto-attaches a provenance attestation.
  # Requirements: id-token: write permission, npm CLI >= 11.5.1.
  publish-npm:
    name: Publish @geoffgodwin/sdivi-wasm to npm
    needs: [create-release]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm-publish
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (WASM toolchain)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack ${{ env.WASM_PACK_VERSION }}
        run: cargo install wasm-pack --version ${{ env.WASM_PACK_VERSION }} --locked

      - uses: Swatinem/rust-cache@v2

      - name: Build WASM bundler target (release profile)
        working-directory: bindings/sdivi-wasm
        # wasm-pack 0.13.x conflicts between --release and --profile; use --release only.
        run: wasm-pack build --target bundler --release --out-dir pkg/bundler

      - name: Build WASM nodejs target (release profile)
        working-directory: bindings/sdivi-wasm
        run: wasm-pack build --target nodejs --release --out-dir pkg/node

      - name: Report WASM bundle sizes
        working-directory: bindings/sdivi-wasm
        run: |
          SIZE_BUNDLER=$(wc -c < pkg/bundler/sdivi_wasm_bg.wasm)
          SIZE_NODE=$(wc -c < pkg/node/sdivi_wasm_bg.wasm)
          echo "bundler .wasm: ${SIZE_BUNDLER} bytes ($(( SIZE_BUNDLER / 1024 )) KiB)"
          echo "nodejs  .wasm: ${SIZE_NODE} bytes ($(( SIZE_NODE / 1024 )) KiB)"
          echo "combined:      $(( SIZE_BUNDLER + SIZE_NODE )) bytes"

      - name: Assemble pkg/package.json from template
        working-directory: bindings/sdivi-wasm
        run: cp pkg-template/package.json pkg/package.json

      - name: Ship LICENSE + NOTICE + README at package root
        # Without these at pkg root, license-compliance scanners (Artifactory
        # Xray, etc.) flag the tarball as "license declared without text
        # shipped" and may quarantine. The outer pkg/package.json `files`
        # field already declares these — this step makes good on the promise.
        run: |
          cp LICENSE bindings/sdivi-wasm/pkg/LICENSE
          cp NOTICE  bindings/sdivi-wasm/pkg/NOTICE
          cp bindings/sdivi-wasm/README.md bindings/sdivi-wasm/pkg/README.md

      - name: Remove wasm-pack auto-generated .gitignore files
        working-directory: bindings/sdivi-wasm
        # wasm-pack writes a `.gitignore` containing `*` into each --out-dir.
        # `npm publish` honors those and silently strips bundler/ and node/
        # from the tarball even though they appear in the `files` field.
        run: rm -f pkg/bundler/.gitignore pkg/node/.gitignore pkg/.gitignore

      # Node 24 ships with npm 11.x bundled, which is what trusted publishing
      # needs (>= 11.5.1 for the OIDC token exchange). Self-upgrading via
      # `npm install -g npm@latest` is unreliable — npm rewrites its own
      # files mid-execution and can leave the install in a broken state
      # (MODULE_NOT_FOUND for `promise-retry` in v0.2.4 release run).
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Dry-run (pre-release tags only)
        if: contains(github.ref_name, '-rc')
        working-directory: bindings/sdivi-wasm/pkg
        run: npm publish --dry-run --access public

      - name: Publish to npm (release tags only)
        if: "!contains(github.ref_name, '-rc')"
        working-directory: bindings/sdivi-wasm/pkg
        # No NODE_AUTH_TOKEN needed — npm CLI detects the GitHub OIDC env
        # vars (ACTIONS_ID_TOKEN_REQUEST_TOKEN/_URL) and exchanges them for
        # registry credentials via the trusted-publisher config. Provenance
        # attestation is generated automatically.
        run: npm publish --access public
