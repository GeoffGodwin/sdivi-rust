name: WASM

on:
  push:
    branches: [main, "milestones/**", "feat/**", "fix/**", "chore/**", "docs/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  WASM_PACK_VERSION: "0.13.1"
  WASM_BUDGET_BYTES: "1258291"   # 1.2 MB

jobs:
  build:
    name: Build WASM (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --version ${{ env.WASM_PACK_VERSION }} --locked

      - name: Verify sdi-core has no forbidden deps on wasm32
        run: |
          cargo tree -p sdi-core --target wasm32-unknown-unknown --no-default-features 2>&1 | tee /tmp/tree.txt
          if grep -E "tree-sitter|walkdir|ignore|rayon|tempfile" /tmp/tree.txt; then
            echo "FAIL: forbidden deps found in sdi-core wasm32 tree"
            exit 1
          fi
          echo "OK: no forbidden deps"

      - name: Build WASM bundle (release-wasm profile)
        working-directory: bindings/sdi-wasm
        run: wasm-pack build --target bundler --profile release-wasm

      - name: Check bundle size
        working-directory: bindings/sdi-wasm/pkg
        run: |
          SIZE=$(wc -c < sdi_wasm_bg.wasm)
          echo "Bundle size: ${SIZE} bytes (budget: ${{ env.WASM_BUDGET_BYTES }})"
          if [ "$SIZE" -gt "${{ env.WASM_BUDGET_BYTES }}" ]; then
            echo "FAIL: .wasm exceeds 1.2 MB budget (${SIZE} bytes)"
            exit 1
          fi
          echo "OK: within budget"

      - name: Capture normalize_and_hash output for cross-platform check
        working-directory: bindings/sdi-wasm
        run: |
          wasm-pack test --node -- --test normalize_hash_deterministic 2>&1 | tee /tmp/hash_out.txt || true
          # Extract the CI_HASH line from test output if present
          grep -oE 'CI_HASH:[0-9a-f]{64}' /tmp/hash_out.txt | sed 's/CI_HASH://' > /tmp/normalize_hash.txt || true
          echo "Captured hash: $(cat /tmp/normalize_hash.txt)"

      - name: Upload hash artifact for cross-platform comparison
        uses: actions/upload-artifact@v4
        with:
          name: normalize-hash-${{ matrix.os }}
          path: /tmp/normalize_hash.txt
          if-no-files-found: warn

      - name: Run WASM smoke tests (Node)
        working-directory: bindings/sdi-wasm
        run: wasm-pack test --node

      - name: Dry-run npm publish (tagged releases only)
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: bindings/sdi-wasm/pkg
        run: npm publish --dry-run --access public

  cross-platform-hash:
    name: Cross-platform hash determinism check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download linux hash
        uses: actions/download-artifact@v4
        with:
          name: normalize-hash-ubuntu-latest
          path: /tmp/linux

      - name: Download macos hash
        uses: actions/download-artifact@v4
        with:
          name: normalize-hash-macos-latest
          path: /tmp/macos

      - name: Compare hashes
        run: |
          LINUX=$(cat /tmp/linux/normalize_hash.txt)
          MACOS=$(cat /tmp/macos/normalize_hash.txt)
          echo "Linux:  $LINUX"
          echo "macOS:  $MACOS"
          if [[ -z "$LINUX" || -z "$MACOS" ]]; then
            echo "[WARN] hash capture was empty — smoke test may not have printed a hash; skipping comparison"
            exit 0
          fi
          if [[ "$LINUX" != "$MACOS" ]]; then
            echo "FAIL: normalize_and_hash differs between Linux and macOS!"
            exit 1
          fi
          echo "OK: identical blake3 digest on both platforms"
