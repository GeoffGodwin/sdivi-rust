# KD11 Leiden quality verification: compares the native Rust Leiden port against
# the Python `leidenalg` reference implementation. Gate criteria:
#   - modularity within 1% of leidenalg on all fixture graphs
#   - community count within ±10% of leidenalg on all fixture graphs
#
# This workflow is a placeholder. It will be populated when the native Leiden
# port lands in Milestone 5 (sdi-detection). The feature flag `verify-leiden`
# and the Python side of the cross-check live in:
#   crates/sdi-detection/tests/leiden_quality.rs
#   tests/fixtures/leiden-graphs/{small,medium,large}/
#
# DO NOT enable this workflow until the Leiden port exists — it will fail.

name: Verify Leiden (KD11)

on:
  workflow_dispatch:
  # Uncomment when the Leiden port lands (Milestone 5):
  # push:
  #   branches: [main]
  #   paths:
  #     - "crates/sdi-detection/**"

jobs:
  verify:
    name: Leiden quality cross-check
    runs-on: ubuntu-latest
    # Remove this `if` when the Leiden port exists.
    if: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install leidenalg
        run: pip install leidenalg igraph

      - name: Run Leiden verification tests
        run: cargo test --workspace --features verify-leiden -p sdi-detection
