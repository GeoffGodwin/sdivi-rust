# KD11 Leiden quality verification: compares the native Rust Leiden port against
# the Python `leidenalg` reference implementation. Gate criteria:
#   - modularity within 1% of leidenalg on all fixture graphs
#   - community count within ±10% of leidenalg on all fixture graphs
#
# Implementation lives in:
#   crates/sdivi-detection/src/leiden/
#   crates/sdivi-detection/tests/leiden_quality.rs  (gated: verify-leiden feature)
#   tests/fixtures/leiden-graphs/{small,medium,large}/
#   tools/generate-leiden-fixtures.py
#
# Regenerate reference fixtures:
#   pip install leidenalg igraph
#   python tools/generate-leiden-fixtures.py --leiden

name: Verify Leiden (KD11)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "crates/sdivi-detection/**"
      - "tests/fixtures/leiden-graphs/**"
      - "tools/generate-leiden-fixtures.py"
  pull_request:
    paths:
      - "crates/sdivi-detection/**"
      - "tests/fixtures/leiden-graphs/**"

jobs:
  verify:
    name: Leiden quality cross-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install leidenalg
        run: pip install leidenalg igraph

      - name: Regenerate reference fixtures from leidenalg
        run: python tools/generate-leiden-fixtures.py --leiden

      - name: Run Leiden verification tests
        run: cargo test -p sdivi-detection --features verify-leiden -- --nocapture
