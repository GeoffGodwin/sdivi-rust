# sdi-py style config — CLAUDE.md requires read-compat with sdi-py
# This fixture represents a typical sdi-py project config.

[core]
languages = "auto"
exclude = [
  "**/vendor/**",
  "**/node_modules/**",
  "**/__pycache__/**",
  "**/dist/**",
]
random_seed = 42

[snapshots]
dir = ".sdi/snapshots"
retention = 50

[boundaries]
spec_file = ".sdi/boundaries.yaml"
leiden_gamma = 1.2
stability_threshold = 5
weighted_edges = false

[patterns]
categories = "auto"
min_pattern_nodes = 3
scope_exclude = ["**/tests/**"]

[thresholds]
pattern_entropy_rate = 3.0
convention_drift_rate = 4.0
coupling_delta_rate = 0.2
boundary_violation_rate = 3.0

[change_coupling]
min_frequency = 0.7
history_depth = 200

[output]
format = "text"
color = "auto"
